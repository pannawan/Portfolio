```html
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(
        180deg,
        #4fc3f7,
        #81d4fa,
        #fff176
    );
    display:flex;
    justify-content:center;
    align-items:center;
}


/* พระอาทิตย์ */
.sun{
    position:absolute;
    width:180px;
    height:180px;
    background:#ffd600;
    border-radius:50%;
    top:50px;
    right:80px;
    box-shadow:0 0 60px #ffea00;
}


/* เมฆ */
.cloud{
    position:absolute;
    background:white;
    border-radius:50px;
    opacity:0.8;
}

.cloud1{
    width:180px;
    height:50px;
    top:100px;
    left:80px;
}

.cloud2{
    width:230px;
    height:60px;
    bottom:120px;
    right:50px;
}


/* นก */
.bird{
    position:absolute;
    color:#ffd600;
    font-size:45px;
    animation:fly 12s infinite linear;
}

.bird1{
    top:120px;
    left:-100px;
}

.bird2{
    top:250px;
    left:-150px;
    animation-delay:4s;
}

.bird3{
    top:350px;
    left:-200px;
    animation-delay:7s;
}


@keyframes fly{

    0%{
        transform:translateX(0);
    }

    100%{
        transform:translateX(120vw);
    }

}


/* กล่องหลัก */

.container{

    position:relative;
    z-index:5;
    width:90%;
    max-width:850px;

    background:rgba(255,255,255,0.35);
    backdrop-filter:blur(12px);

    border-radius:35px;

    padding:50px;

    text-align:center;

    box-shadow:
    0 20px 40px rgba(0,0,0,0.15);

}


.profile{

    width:180px;
    height:180px;

    border-radius:50%;

    object-fit:cover;

    border:8px solid #fff;

}


h1{

    margin-top:20px;

    font-size:45px;

    color:#075985;

}


h2{

    color:#eab308;

    font-size:28px;

}


p{

    margin-top:15px;

    font-size:20px;

    color:#164e63;

}



button{

    margin-top:25px;

    padding:14px 40px;

    border:none;

    border-radius:30px;

    background:#facc15;

    color:#075985;

    font-size:18px;

    cursor:pointer;

    box-shadow:0 5px 15px #eab308;

}


button:hover{

    transform:translateY(-5px);

    background:#fde047;

}


/* ดาวตกแต่ง */

.star{

    position:absolute;

    color:#fff;

    font-size:30px;

}


.star1{
    top:20%;
    left:20%;
}

.star2{
    bottom:20%;
    left:10%;
}

.star3{
    top:30%;
    right:25%;
}


</style>

</head>


<body>


<div class="sun"></div>


<div class="cloud cloud1"></div>
<div class="cloud cloud2"></div>


<!-- นกสีเหลือง -->
<div class="bird bird1">🐦</div>
<div class="bird bird2">🐤</div>
<div class="bird bird3">🐦</div>


<div class="star star1">⭐</div>
<div class="star star2">⭐</div>
<div class="star star3">✨</div>



<div class="container">


<img src="images/profile.jpg" class="profile">


<h1>ปัญนวรรณ - ธานะวาท</h1>


<h2>Student Portfolio</h2>


<p>
นักเรียนชั้นมัธยมศึกษาปีที่ 6/3<br>
Welcome to my Portfolio
</p>


<button onclick="location.href='personal.html'">
เข้าสู่ Portfolio
</button>


</div>


</body>
</html>
```
