<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>My Portfolio</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Arial", sans-serif;
}

body{

    height:100vh;
    overflow:hidden;
    background: linear-gradient(
        135deg,
        #38bdf8,
        #60a5fa,
        #fde047
    );

}


/* ลูกโป่งน้ำด้านหลัง */

.bubble{

    position:absolute;
    bottom:-100px;
    background:rgba(255,255,255,0.35);
    border-radius:50%;
    animation:float 12s infinite;
}


@keyframes float{

    0%{
        transform:translateY(0);
        opacity:0;
    }

    20%{
        opacity:1;
    }

    100%{
        transform:translateY(-110vh);
        opacity:0;
    }

}


/* สร้างลูกโป่งหลายขนาด */

.b1{
    width:80px;
    height:80px;
    left:10%;
    animation-duration:10s;
}

.b2{
    width:120px;
    height:120px;
    left:30%;
    animation-duration:15s;
}

.b3{
    width:60px;
    height:60px;
    left:55%;
    animation-duration:8s;
}

.b4{
    width:150px;
    height:150px;
    left:75%;
    animation-duration:18s;
}

.b5{
    width:90px;
    height:90px;
    left:90%;
    animation-duration:12s;
}



/* เมนู */

nav{

    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    z-index:2;

}


nav a{

    text-decoration:none;
    color:white;
    background:#2563eb;
    padding:12px 20px;
    margin:5px;
    border-radius:30px;
    transition:0.3s;

}


nav a:hover{

    background:#facc15;
    color:#1e3a8a;

}



/* เนื้อหาหลัก */

.home{

    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    position:relative;
    z-index:1;

}


.card{

    background:rgba(255,255,255,0.85);
    padding:40px;
    border-radius:30px;
    width:500px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);

}


.profile{

    width:170px;
    height:170px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #facc15;

}


h1{

    color:#2563eb;
    font-size:40px;
    margin-top:20px;

}


h2{

    color:#eab308;
    margin:10px;

}


p{

    color:#334155;
    line-height:1.6;

}


.button{

    display:inline-block;
    margin-top:25px;
    padding:15px 30px;
    background:#2563eb;
    color:white;
    border-radius:30px;
    text-decoration:none;

}


.button:hover{

    background:#facc15;
    color:#1e3a8a;

}


</style>

</head>


<body>


<!-- ลูกโป่งน้ำ -->

<div class="bubble b1"></div>
<div class="bubble b2"></div>
<div class="bubble b3"></div>
<div class="bubble b4"></div>
<div class="bubble b5"></div>



<!-- เมนูไปหน้าอื่น -->

<nav>

<a href="index.html">Home</a>
<a href="personal.html">Personal</a>
<a href="education.html">Education</a>
<a href="activity.html">Activity</a>
<a href="contact.html">Contact</a>

</nav>



<!-- หน้าแรก -->

<section class="home">

<div class="card">


<img src="images/profile.jpg" 
class="profile"
alt="profile">


<h1>
ปัญนวรรณ ธานะวาท
</h1>


<h2>
Student Portfolio
</h2>


<p>
สวัสดีค่ะ เว็บไซต์ Portfolio นี้จัดทำขึ้นเพื่อรวบรวม
ประวัติส่วนตัว การศึกษา กิจกรรม และผลงานต่าง ๆ
สำหรับการศึกษาต่อในระดับมหาวิทยาลัย
</p>


<a href="personal.html" class="button">
เข้าสู่ Portfolio
</a>


</div>

</section>


</body>
</html>
